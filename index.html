<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEWDS FOCUS</title>
    <meta name="description" content="AI-based smart auto-focus and subject tracking">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600&family=Inter:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app-container">
        <video id="source-video" playsinline webkit-playsinline muted crossorigin="anonymous"></video>
        <canvas id="render-canvas"></canvas>
        <div class="bg-layer">
            <div class="bg-grid"></div>
            <div class="bg-circle inner"></div>
            <div class="bg-circle"></div>
        </div>
        <div id="ui-layer">
            <div class="top-left-controls">
                <header class="app-header">
                    <div class="header-content">
                        <h1>PEWDS<span>FOCUS</span></h1>
                        <div id="status-badge" class="badge">INITIALIZING...</div>
                    </div>
                </header>
                <div class="menu-panel">
                    <div class="panel-header">
                        <div class="red-dot"></div>
                        <h2>CONTROLS</h2>
                        <div class="red-dot"></div>
                    </div>

                    <div class="menu-items">
                        <div id="btn-webcam" class="menu-item-row action">
                            <div class="item-num">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M23 7l-7 5 7 5V7z"></path>
                                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                                </svg>
                            </div>
                            <div class="item-text-col">
                                <h3>WEBCAM</h3>
                                <p>live tracking</p>
                            </div>
                            <div class="item-arrow">
                                <svg viewBox="0 0 24 24" fill="#ef4444">
                                    <polygon points="8,5 20,12 8,19" />
                                </svg>
                            </div>
                        </div>
                        <label for="video-upload" class="menu-item-row action">
                            <div class="item-num">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                            </div>
                            <div class="item-text-col">
                                <h3>UPLOAD</h3>
                                <p>process file</p>
                            </div>
                            <div class="item-arrow">
                                <svg viewBox="0 0 24 24" fill="#ef4444">
                                    <polygon points="8,5 20,12 8,19" />
                                </svg>
                            </div>
                        </label>
                        <input type="file" id="video-upload" accept="video/mp4,video/webm" hidden>

                        <div id="btn-play-again" class="menu-item-row action" style="display: none;">
                            <div class="item-num">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                </svg>
                            </div>
                            <div class="item-text-col">
                                <h3>PLAY AGAIN</h3>
                                <p>restart video</p>
                            </div>
                            <div class="item-arrow">
                                <svg viewBox="0 0 24 24" fill="#ef4444">
                                    <polygon points="8,5 20,12 8,19" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="panel-divider">
                        SELECT SOURCE
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
